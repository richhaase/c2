version: 2

builds:
  - main: ./cmd/c2
    binary: c2
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
