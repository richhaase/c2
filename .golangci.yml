version: "2"

linters:
  enable:
    - govet
    - ineffassign
    - misspell
    - unused
    - errcheck
    - staticcheck
    - gosec
    - nolintlint
  settings:
    gosec:
      excludes:
        - G204 # subprocess execution — expected for CLI tools
        - G301 # directory permissions — 0755 is fine for data dirs
        - G302 # file permissions — 0644 is fine for data files
        - G304 # file inclusion via variable — paths are constructed, not user input
        - G704 # SSRF — URL is from config, not user input
